name: Reusable Publish UPM Release

on:
  workflow_call:
    inputs:
      package_json_path:
        description: "Path to the Unity package.json file."
        required: false
        type: string
        default: "package.json"
      source_prefix:
        description: "Prefix for the generated source archive. Defaults to the package name."
        required: false
        type: string
        default: ""
      release_notes_limit:
        description: "Number of recent commits to include when no previous tag exists."
        required: false
        type: number
        default: 20
      sign_upm_package:
        description: "Pack and sign a Unity Package Manager tarball for GitHub Release assets."
        required: false
        type: boolean
        default: true
    secrets:
      UPM_SERVICE_ACCOUNT_KEY_ID:
        description: "Unity service account key id used by the UPM CLI."
        required: false
      UPM_SERVICE_ACCOUNT_KEY_SECRET:
        description: "Unity service account key secret used by the UPM CLI."
        required: false
      UPM_ORG_ID:
        description: "Unity organization id that signs the UPM package."
        required: false
    outputs:
      released:
        description: "true if a new release was created."
        value: ${{ jobs.publish-release.outputs.released }}
      tag:
        description: "Package version tag."
        value: ${{ jobs.publish-release.outputs.tag }}
      version:
        description: "Package version."
        value: ${{ jobs.publish-release.outputs.version }}

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      released: ${{ steps.result.outputs.released }}
      tag: ${{ steps.package.outputs.tag }}
      version: ${{ steps.package.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force fetch tags
        run: git fetch --tags --force

      - name: Read package version
        id: package
        shell: bash
        run: |
          package_json="${{ inputs.package_json_path }}"
          version="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["version"])' "$package_json")"
          name="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["name"])' "$package_json")"
          tag="${version}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check whether version tag exists
        id: tag
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.package.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source artifact
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          mkdir -p artifacts
          prefix="${{ inputs.source_prefix }}"
          if [ -z "$prefix" ]; then
            prefix="${{ steps.package.outputs.name }}"
          fi
          git archive --format=zip --output="artifacts/${prefix}-${{ steps.package.outputs.version }}-source.zip" HEAD

      - name: Check UPM signing secrets
        if: steps.tag.outputs.exists == 'false' && inputs.sign_upm_package
        shell: bash
        env:
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
        run: |
          missing=0
          for name in UPM_SERVICE_ACCOUNT_KEY_ID UPM_SERVICE_ACCOUNT_KEY_SECRET UPM_ORG_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Unity UPM CLI
        if: steps.tag.outputs.exists == 'false' && inputs.sign_upm_package
        shell: bash
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh -o install-upm-cli.sh
          bash install-upm-cli.sh
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Verify Unity UPM CLI
        if: steps.tag.outputs.exists == 'false' && inputs.sign_upm_package
        shell: bash
        run: upm --help

      - name: Show UPM signing configuration summary
        if: steps.tag.outputs.exists == 'false' && inputs.sign_upm_package
        shell: bash
        env:
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
        run: |
          echo "UPM_ORG_ID=${UPM_ORG_ID}"
          echo "UPM_SERVICE_ACCOUNT_KEY_ID prefix=${UPM_SERVICE_ACCOUNT_KEY_ID:0:8}"
          echo "UPM_SERVICE_ACCOUNT_KEY_ID length=${#UPM_SERVICE_ACCOUNT_KEY_ID}"
          echo "UPM_SERVICE_ACCOUNT_KEY_SECRET length=${#UPM_SERVICE_ACCOUNT_KEY_SECRET}"
          if [[ ! "$UPM_SERVICE_ACCOUNT_KEY_ID" =~ ^[0-9a-fA-F-]{36}$ ]]; then
            echo "::warning::UPM_SERVICE_ACCOUNT_KEY_ID does not look like a Unity service account Key ID UUID."
          fi
          if [[ ! "$UPM_ORG_ID" =~ ^[0-9]+$ ]]; then
            echo "::warning::UPM_ORG_ID does not look like the numeric Unity Organization ID."
          fi

      - name: Pack and sign UPM package
        if: steps.tag.outputs.exists == 'false' && inputs.sign_upm_package
        id: upm
        shell: bash
        env:
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
          UGS_CLI_SERVICE_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UGS_CLI_SERVICE_SECRET_KEY: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          UNITY_ORGANIZATION_ID: ${{ secrets.UPM_ORG_ID }}
          UNITY_ORG_ID: ${{ secrets.UPM_ORG_ID }}
          DIST_DIR: /tmp/signed-upm-dist
        run: |
          package_json="${{ inputs.package_json_path }}"
          package_dir="$(dirname "$package_json")"
          mkdir -p "$DIST_DIR"
          upm pack "$package_dir" --organization-id "$UPM_ORG_ID" --destination "$DIST_DIR"

          shopt -s nullglob
          archives=("$DIST_DIR"/*.tgz "$DIST_DIR"/*.tar.gz)
          if [ "${#archives[@]}" -ne 1 ]; then
            printf 'Expected exactly one signed package archive, found %s\n' "${#archives[@]}" >&2
            exit 1
          fi

          archive="${archives[0]}"
          tar -tzf "$archive" | grep -qx 'package/package.json'
          tar -tzf "$archive" | grep -qx 'package/.attestation.p7m'

          archive_name="$(basename "$archive")"
          cp "$archive" "artifacts/$archive_name"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
          printf 'Signed UPM archive: %s\n' "$archive_name"
          tar -xOzf "$archive" package/package.json | python -m json.tool

      - name: Generate release notes
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          previous_tag="$(git tag --sort=-creatordate | head -n 1 || true)"
          {
            echo "## Changes"
            echo
            if [ -n "$previous_tag" ]; then
              git log "${previous_tag}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log -n "${{ inputs.release_notes_limit }}" --pretty=format:"- %s (%h)"
            fi
            echo
            echo
            echo "## Artifacts"
            echo
            echo "- Source archive"
            if [ "${{ inputs.sign_upm_package }}" = "true" ]; then
              echo "- Signed UPM package: ${{ steps.upm.outputs.archive_name }}"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: ${{ steps.package.outputs.version }}
          body_path: release-notes.md
          files: artifacts/*

      - name: Set result
        id: result
        shell: bash
        run: |
          if [ "${{ steps.tag.outputs.exists }}" = "false" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.package.outputs.tag }} already exists. Release skipped."
          fi
